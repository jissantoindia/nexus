name: Build & Release Nexus

# Trigger: push a version tag like v1.0.0, v1.2.3, etc.
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ── macOS build — signed + notarized (no Gatekeeper warning) ──────────────
  build-mac:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Import Developer ID Application certificate (gracefully skipped if not set)
      - name: Import signing certificate
        env:
          CERTIFICATE_P12:        ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD:   ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Skip if certificate secret is not configured yet
          if [ -z "$CERTIFICATE_P12" ]; then
            echo "⚠️  No signing certificate — building unsigned DMG"
            exit 0
          fi

          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          CERT_PATH=$RUNNER_TEMP/cert.p12

          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "build_keychain_pw" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "build_keychain_pw" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "build_keychain_pw" "$KEYCHAIN_PATH"

      - name: Build web (Vite)
        run: npm run build
        env:
          ELECTRON_BUILD: true
          VITE_APPWRITE_ENDPOINT:               ${{ secrets.VITE_APPWRITE_ENDPOINT }}
          VITE_APPWRITE_PROJECT_ID:             ${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          VITE_APPWRITE_DATABASE_ID:            ${{ secrets.VITE_APPWRITE_DATABASE_ID }}
          VITE_APPWRITE_PROJECTS_COLLECTION_ID: ${{ secrets.VITE_APPWRITE_PROJECTS_COLLECTION_ID }}
          VITE_APPWRITE_REQUESTS_COLLECTION_ID: ${{ secrets.VITE_APPWRITE_REQUESTS_COLLECTION_ID }}
          VITE_APPWRITE_DOCS_COLLECTION_ID:     ${{ secrets.VITE_APPWRITE_DOCS_COLLECTION_ID }}
          VITE_APPWRITE_MEMBERS_COLLECTION_ID:  ${{ secrets.VITE_APPWRITE_MEMBERS_COLLECTION_ID }}
          VITE_APPWRITE_FEEDBACK_COLLECTION_ID: ${{ secrets.VITE_APPWRITE_FEEDBACK_COLLECTION_ID }}
          VITE_APPWRITE_SETTINGS_COLLECTION_ID: ${{ secrets.VITE_APPWRITE_SETTINGS_COLLECTION_ID }}
          VITE_APPWRITE_FEEDBACK_BUCKET_ID:     ${{ secrets.VITE_APPWRITE_FEEDBACK_BUCKET_ID }}
          VITE_APPWRITE_MANAGE_USERS_FUNCTION_ID: ${{ secrets.VITE_APPWRITE_MANAGE_USERS_FUNCTION_ID }}
          VITE_OPENAI_API_KEY:               ${{ secrets.VITE_OPENAI_API_KEY }}

      # Sign + notarize if cert is configured, otherwise build unsigned DMG
      - name: Package macOS app (signed if cert available)
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12" ]; then
            echo "⚠️  Building unsigned DMG (no signing cert configured)"
            unset CSC_LINK CSC_KEY_PASSWORD
            CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac --publish always
          else
            CSC_LINK="$APPLE_CERTIFICATE_P12" \
            CSC_KEY_PASSWORD="$APPLE_CERTIFICATE_PASSWORD" \
            npx electron-builder --mac --publish always
          fi
        env:
          GH_TOKEN:                    ${{ secrets.GH_TOKEN }}
          APPLE_CERTIFICATE_P12:       ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD:  ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}

  # ── Windows build (NSIS installer) ────────────────────────────────────────
  build-win:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web (Vite)
        run: npm run build
        env:
          ELECTRON_BUILD: true
          VITE_APPWRITE_ENDPOINT:            ${{ secrets.VITE_APPWRITE_ENDPOINT }}
          VITE_APPWRITE_PROJECT_ID:          ${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          VITE_APPWRITE_DATABASE_ID:         ${{ secrets.VITE_APPWRITE_DATABASE_ID }}
          VITE_APPWRITE_PROJECTS_COLLECTION_ID: ${{ secrets.VITE_APPWRITE_PROJECTS_COLLECTION_ID }}
          VITE_APPWRITE_REQUESTS_COLLECTION_ID: ${{ secrets.VITE_APPWRITE_REQUESTS_COLLECTION_ID }}
          VITE_APPWRITE_DOCS_COLLECTION_ID:     ${{ secrets.VITE_APPWRITE_DOCS_COLLECTION_ID }}
          VITE_APPWRITE_MEMBERS_COLLECTION_ID:  ${{ secrets.VITE_APPWRITE_MEMBERS_COLLECTION_ID }}
          VITE_APPWRITE_FEEDBACK_COLLECTION_ID: ${{ secrets.VITE_APPWRITE_FEEDBACK_COLLECTION_ID }}
          VITE_APPWRITE_SETTINGS_COLLECTION_ID: ${{ secrets.VITE_APPWRITE_SETTINGS_COLLECTION_ID }}
          VITE_APPWRITE_FEEDBACK_BUCKET_ID:     ${{ secrets.VITE_APPWRITE_FEEDBACK_BUCKET_ID }}
          VITE_APPWRITE_MANAGE_USERS_FUNCTION_ID: ${{ secrets.VITE_APPWRITE_MANAGE_USERS_FUNCTION_ID }}
          VITE_OPENAI_API_KEY:               ${{ secrets.VITE_OPENAI_API_KEY }}

      - name: Package Windows app
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  # ── Linux build (AppImage) ─────────────────────────────────────────────────
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system deps (AppImage)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-dev libgtk-3-dev libnotify-dev \
            libnss3 libxss1 libxtst6 \
            xauth xvfb fuse libfuse2 rpm

      - name: Install dependencies
        run: npm ci

      - name: Build web (Vite)
        run: npm run build
        env:
          ELECTRON_BUILD: true
          VITE_APPWRITE_ENDPOINT:            ${{ secrets.VITE_APPWRITE_ENDPOINT }}
          VITE_APPWRITE_PROJECT_ID:          ${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          VITE_APPWRITE_DATABASE_ID:         ${{ secrets.VITE_APPWRITE_DATABASE_ID }}
          VITE_APPWRITE_PROJECTS_COLLECTION_ID: ${{ secrets.VITE_APPWRITE_PROJECTS_COLLECTION_ID }}
          VITE_APPWRITE_REQUESTS_COLLECTION_ID: ${{ secrets.VITE_APPWRITE_REQUESTS_COLLECTION_ID }}
          VITE_APPWRITE_DOCS_COLLECTION_ID:     ${{ secrets.VITE_APPWRITE_DOCS_COLLECTION_ID }}
          VITE_APPWRITE_MEMBERS_COLLECTION_ID:  ${{ secrets.VITE_APPWRITE_MEMBERS_COLLECTION_ID }}
          VITE_APPWRITE_FEEDBACK_COLLECTION_ID: ${{ secrets.VITE_APPWRITE_FEEDBACK_COLLECTION_ID }}
          VITE_APPWRITE_SETTINGS_COLLECTION_ID: ${{ secrets.VITE_APPWRITE_SETTINGS_COLLECTION_ID }}
          VITE_APPWRITE_FEEDBACK_BUCKET_ID:     ${{ secrets.VITE_APPWRITE_FEEDBACK_BUCKET_ID }}
          VITE_APPWRITE_MANAGE_USERS_FUNCTION_ID: ${{ secrets.VITE_APPWRITE_MANAGE_USERS_FUNCTION_ID }}
          VITE_OPENAI_API_KEY:               ${{ secrets.VITE_OPENAI_API_KEY }}

      - name: Package Linux app
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  # ── Web build → deploy to server ──────────────────────────────────────────
  build-web:
    name: Web (PWA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build PWA
        run: npm run build
        env:
          VITE_APPWRITE_ENDPOINT:            ${{ secrets.VITE_APPWRITE_ENDPOINT }}
          VITE_APPWRITE_PROJECT_ID:          ${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          VITE_APPWRITE_DATABASE_ID:         ${{ secrets.VITE_APPWRITE_DATABASE_ID }}
          VITE_APPWRITE_PROJECTS_COLLECTION_ID: ${{ secrets.VITE_APPWRITE_PROJECTS_COLLECTION_ID }}
          VITE_APPWRITE_REQUESTS_COLLECTION_ID: ${{ secrets.VITE_APPWRITE_REQUESTS_COLLECTION_ID }}
          VITE_APPWRITE_DOCS_COLLECTION_ID:     ${{ secrets.VITE_APPWRITE_DOCS_COLLECTION_ID }}
          VITE_APPWRITE_MEMBERS_COLLECTION_ID:  ${{ secrets.VITE_APPWRITE_MEMBERS_COLLECTION_ID }}
          VITE_APPWRITE_FEEDBACK_COLLECTION_ID: ${{ secrets.VITE_APPWRITE_FEEDBACK_COLLECTION_ID }}
          VITE_APPWRITE_SETTINGS_COLLECTION_ID: ${{ secrets.VITE_APPWRITE_SETTINGS_COLLECTION_ID }}
          VITE_APPWRITE_FEEDBACK_BUCKET_ID:     ${{ secrets.VITE_APPWRITE_FEEDBACK_BUCKET_ID }}
          VITE_APPWRITE_MANAGE_USERS_FUNCTION_ID: ${{ secrets.VITE_APPWRITE_MANAGE_USERS_FUNCTION_ID }}
          VITE_OPENAI_API_KEY:               ${{ secrets.VITE_OPENAI_API_KEY }}

      # ── Option A: Deploy via rsync/SSH to your VPS ──────────────────────
      # Uncomment and configure if you deploy to a Linux server via SSH
      # - name: Deploy to server
      #   uses: easingthemes/ssh-deploy@main
      #   with:
      #     SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      #     ARGS: "-rlgoDzvc --delete"
      #     SOURCE: "dist/"
      #     REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
      #     REMOTE_USER: ${{ secrets.DEPLOY_USER }}
      #     TARGET: /var/www/nexus/

      # ── Option B: Upload dist as artifact (download from Actions tab) ───
      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-web-${{ github.ref_name }}
          path: dist/
          retention-days: 30
